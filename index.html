<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIKE • Matt Furie 1984 • $SPIKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            font-family: 'Press Start 2P', system-ui, sans-serif; 
            overflow-x: hidden;
        }
        
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.65)), 
                        url('https://i.imgur.com/YaCFxLC.png') center/cover no-repeat fixed;
            position: relative;
            overflow: hidden;
        }

        /* Container Partikel */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 105, 180, 0.75);
            border-radius: 50%;
            animation: particleFloat linear infinite;
            box-shadow: 0 0 6px rgba(255, 105, 180, 0.5);
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
            15% { opacity: 0.85; }
            85% { opacity: 0.85; }
            100% { transform: translateY(-120px) scale(0.3); opacity: 0; }
        }

        .cartoon-text {
            text-shadow: -4px -4px 0 #ff1493, 4px -4px 0 #ff1493, 
                         -4px 4px 0 #ff1493, 4px 4px 0 #ff1493;
            -webkit-text-stroke: 4px #ff1493;
            paint-order: stroke fill;
        }

        .spike-logo {
            animation: logoGentleSway 4s ease-in-out infinite;
        }
        @keyframes logoGentleSway {
            0%, 100% { transform: rotate(-4deg); }
            50% { transform: rotate(4deg); }
        }

        .floating-spike {
            animation: floatSpike 6.5s ease-in-out infinite;
            filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.5));
            opacity: 0.85;
        }
        
        @keyframes floatSpike {
            0%, 100% { transform: translateY(0px) rotate(-2.5deg); }
            50% { transform: translateY(-28px) rotate(2.5deg); }
        }

        .spike-title {
            animation: titlePop 1.2s forwards 0.3s, glowPulse 3s ease-in-out infinite 1.8s;
        }

        @keyframes titlePop {
            0% { opacity: 0; transform: translateY(40px) scale(0.85); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: -4px -4px 0 #ff1493, 4px -4px 0 #ff1493, -4px 4px 0 #ff1493, 4px 4px 0 #ff1493, 0 0 20px #ff1493; }
            50% { text-shadow: -4px -4px 0 #ff1493, 4px -4px 0 #ff1493, -4px 4px 0 #ff1493, 4px 4px 0 #ff1493, 0 0 45px #ff69b4; }
        }

        .subtitle-text {
            font-size: clamp(1rem, 4.2vw, 1.5rem);
            line-height: 1.45;
        }

        .typewriter {
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid #ff69b4;
            animation: typing 3.5s steps(45, end) forwards, blink-caret 0.8s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #ff69b4; }
        }

        .spike-btn { 
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .spike-btn:hover { 
            transform: translateY(-4px) scale(1.05); 
        }
    </style>
</head>
<body class="bg-[#3a2a1f] text-white">

    <!-- NAV -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-[#3a2a1f]/95 backdrop-blur-md border-b-4 border-pink-500">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <img src="https://i.imgur.com/16Otpq7.png" 
                     alt="SPIKE Logo" 
                     class="spike-logo w-10 h-10 sm:w-14 sm:h-14 object-contain border-4 border-white shadow-[4px_4px_0_#000] rounded-full bg-white">
                <span class="text-2xl sm:text-4xl font-black tracking-[-2px] text-pink-400" style="text-shadow: 4px 4px 0 #000;">SPIKE</span>
            </div>

            <div class="flex items-center gap-x-3">
                <a href="https://x.com/spiketempo" target="_blank" 
                   class="flex items-center justify-center w-9 h-9 bg-white/10 hover:bg-white/20 border-2 border-white/30 hover:border-pink-400 rounded-xl transition-all">
                    <i class="fab fa-x-twitter text-xl text-white"></i>
                </a>

                <button onclick="buySpike()" 
                        class="spike-btn px-5 py-2.5 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black text-sm tracking-wider rounded-2xl border-4 border-white shadow-[3px_3px_0_#000]">
                    <i class="fas fa-rocket"></i> 
                    <span class="hidden sm:inline">BUY $SPIKE</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- HERO dengan Partikel -->
    <div class="relative min-h-screen pt-20 overflow-hidden hero-bg">
        
        <!-- Partikel Background -->
        <div id="particles" class="particles"></div>

        <div class="relative z-20 flex flex-col items-center justify-center min-h-[calc(100vh-5rem)] px-4 text-center">
            <div class="max-w-4xl mx-auto">
                <h1 class="cartoon-text spike-title text-[34px] sm:text-[48px] md:text-[62px] lg:text-[76px] 
                           leading-none font-black tracking-[-2px] text-white mb-8">
                    BEFORE THE MEMES,<br>
                    <span class="text-pink-300">THERE WAS SPIKE</span>
                </h1>
                
                <div class="max-w-2xl mx-auto">
                    <p class="subtitle-text typewriter font-bold text-white tracking-wider mb-6">
                        The first character ever drawn by Matt Furie. 1984.
                    </p>
                    <p class="text-xl sm:text-2xl font-black text-pink-300 tracking-[2px]">
                        NOW ON-CHAIN.
                    </p>
                </div>
            </div>

            <div class="flex flex-col gap-4 mt-12 w-full max-w-xs mx-auto">
                <button onclick="buySpike()" 
                        class="spike-btn w-full py-5 bg-gradient-to-r from-pink-500 via-rose-500 to-pink-500 text-white text-lg font-black tracking-widest rounded-3xl border-[6px] border-white shadow-[6px_6px_0_#000]">
                    <i class="fas fa-rocket mr-2"></i> BUY $SPIKE
                </button>
                
                <button onclick="copyCA()" 
                        class="spike-btn w-full py-5 bg-white hover:bg-zinc-100 text-pink-600 text-lg font-black tracking-widest rounded-3xl border-[6px] border-pink-600 shadow-[6px_6px_0_#000]">
                    <i class="fas fa-copy mr-2"></i> COPY CA
                </button>
            </div>
        </div>

        <!-- Spike Kiri -->
        <div class="absolute left-8 top-1/2 -translate-y-1/2 z-30 hidden lg:block">
            <img src="https://i.imgur.com/QnJz2LL.png" 
                 alt="Spike Left" 
                 class="floating-spike w-44 md:w-52 lg:w-60 object-contain">
        </div>

        <!-- Spike Kanan -->
        <div class="absolute right-8 top-1/2 -translate-y-1/2 z-30 hidden lg:block">
            <img src="https://i.imgur.com/fjNVviF.png" 
                 alt="Spike Right" 
                 class="floating-spike w-44 md:w-52 lg:w-60 object-contain">
        </div>
    </div>

    <!-- LOADING & POP-UP -->
    <div id="loadingScreen" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[10000]">
        <div class="text-center">
            <div class="loading-spinner mx-auto mb-6" style="width:48px;height:48px;border:6px solid #ff69b4;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <p class="text-pink-300 font-black tracking-[4px] text-lg">LOADING TO TEMPO...</p>
        </div>
    </div>

    <div id="tempoPopup" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div class="popup bg-[#2a2118] border-4 border-pink-500 rounded-3xl p-8 max-w-sm mx-4 text-center relative">
            <button onclick="closePopup()" class="absolute top-4 right-4 text-3xl text-white/70 hover:text-white">✕</button>
            <div class="text-6xl mb-6">🚀</div>
            <h2 class="text-3xl font-black text-pink-300 tracking-widest mb-3">SOON ON TEMPO</h2>
            <p class="text-white/80 text-base">We're launching on Tempo soon.<br>Get ready!</p>
            <button onclick="closePopup()" class="mt-8 w-full py-4 bg-pink-500 hover:bg-pink-600 text-white font-black tracking-widest rounded-2xl border-4 border-white">
                OK, I'M READY
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-black py-12 border-t-4 border-pink-500 text-center text-xs text-white/50 px-4">
        Fan-made tribute to Matt Furie's original 1984 Spike character • 2026
    </footer>

    <script>
        // ================== PARTICLES BACKGROUND (45 partikel - lebih ringan) ==================
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ffffff'];
            
            for (let i = 0; i < 45; i++) {   // Jumlah partikel dikurangi menjadi 45
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4.5 + 2.5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.bottom = `-${Math.random() * 80}px`;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.opacity = Math.random() * 0.55 + 0.35;
                
                const duration = Math.random() * 18 + 14;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `-${Math.random() * 18}s`;
                
                container.appendChild(particle);
            }
        }

        // ================== SCRIPT LAINNYA ==================
        function showTempoPopup() {
            const loading = document.getElementById('loadingScreen');
            loading.classList.remove('hidden');
            loading.classList.add('flex');

            setTimeout(() => {
                loading.classList.add('hidden');
                loading.classList.remove('flex');
                
                document.getElementById('tempoPopup').classList.remove('hidden');
                document.getElementById('tempoPopup').classList.add('flex');
                
                createMiniConfetti();
            }, 1100);
        }

        function buySpike() {
            showTempoPopup();
        }

        function copyCA() {
            showTempoPopup();
        }

        function closePopup() {
            const popup = document.getElementById('tempoPopup');
            popup.classList.add('hidden');
            popup.classList.remove('flex');
        }

        function createMiniConfetti() {
            const colors = ['#ff69b4', '#ff1493', '#ffffff'];
            for (let i = 0; i < 40; i++) {
                const c = document.createElement('div');
                c.style.cssText = `position:fixed;left:${Math.random()*100}vw;top:-40px;width:8px;height:8px;background:${colors[Math.floor(Math.random()*3)]};border-radius:50%;z-index:99999;`;
                document.body.appendChild(c);
                c.animate([{transform: 'translateY(0)', opacity: 1}, 
                          {transform: `translateY(${window.innerHeight*0.6}px) rotate(${Math.random()*600}deg)`, opacity: 0}], 
                    {duration: 1400 + Math.random()*1400, easing: 'ease-out'}).onfinish = () => c.remove();
            }
        }

        // Inisialisasi Partikel saat halaman dimuat
        window.onload = () => {
            createParticles();
        };

        document.getElementById('tempoPopup').addEventListener('click', (e) => {
            if (e.target.id === 'tempoPopup') closePopup();
        });
    </script>
</body>
</html>
